# Copy to `.github/workflows/ci.yml` (or merge steps into your workflow).
# Pushing files under `.github/workflows/` may require a GitHub PAT with the **workflow** scope.
#
# Pytest + Ruff + profile/startup smoke (no Redis required for API job tests — mocked enqueue).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      APP_ENV: development
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e ".[dev,production]"

      - name: Ruff check
        run: ruff check .

      - name: Mypy (scoped)
        run: mypy --config-file mypy.ini

      - name: Pytest tracker-isolation regression
        run: >
          python -m pytest
          tests/test_api.py::test_list_applications_workspace_query_and_user_default
          tests/test_follow_up.py::test_follow_up_priority_sorts_by_ats
          tests/test_follow_up.py::test_list_follow_ups_due
          tests/test_critical_flows.py::TestUserBinding::test_load_applications_filters_by_user_id
          -q --tb=short

      - name: Pytest
        run: python -m pytest tests/ -q --tb=short

      - name: Validate example candidate profile
        run: python scripts/validate_profile.py --path config/candidate_profile.example.json

      - name: Startup report (app)
        run: python scripts/check_startup.py app
