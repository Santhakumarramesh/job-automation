[mypy]
python_version = 3.10
explicit_package_bases = True
ignore_missing_imports = True
disable_error_code = import-untyped
follow_imports = skip
pretty = True
show_error_codes = True
warn_unused_ignores = True

# Phase 5 v0 scope: enforce typing on stable policy/analytics/auth surfaces first.
files =
    app/auth.py,
    app/main.py,
    services/application_decision.py,
    services/application_insights.py,
    services/autonomy_submit_gate.py,
    services/role_templates.py,
    services/tracker_analytics.py,
    services/truth_apply_gate.py,
    services/workspace_write_guard.py
